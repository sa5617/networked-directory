<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Networked Directory &mdash; Shahana Abdin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #d8d3c4; }
  body {
    font-family: 'Special Elite', 'Courier New', Courier, monospace;
    color: #1f1b14;
    font-size: 17px;
    line-height: 2;
    padding: 56px 24px 96px;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .page {
    max-width: 720px;
    margin: 0 auto;
    background: #f5efdd;
    background-image:
      radial-gradient(rgba(0,0,0,0.035) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
      linear-gradient(180deg, #f7f1df 0%, #ede4ca 100%);
    background-size: 3px 3px, 7px 7px, 100% 100%;
    background-position: 0 0, 1px 2px, 0 0;
    padding: 84px 92px 96px;
    box-shadow:
      0 1px 0 rgba(0,0,0,0.06),
      0 14px 30px -10px rgba(0,0,0,0.35),
      0 30px 60px -20px rgba(0,0,0,0.28);
    box-sizing: border-box;
  }
  .slug {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    letter-spacing: 1px;
    color: #46402f;
    border-bottom: 1px dashed #8a7e5c;
    padding-bottom: 8px;
    margin-bottom: 40px;
  }
  .slug .left { text-transform: uppercase; }
  .title {
    text-align: center;
    font-size: 26px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin: 18px 0 6px;
  }
  .sub {
    text-align: center;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5a4f36;
    margin-bottom: 56px;
  }
  p {
    margin: 0 0 22px;
    text-indent: 3em;
    text-shadow: 0.3px 0.2px 0 rgba(0,0,0,0.22);
  }
  #skip {
    position: fixed;
    bottom: 32px;
    right: 32px;
    font: inherit;
    background: transparent;
    border: 1px dashed #8a7e5c;
    color: #46402f;
    padding: 6px 18px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 12px;
    opacity: 0.8;
  }
  #skip:hover { color: #1f1b14; border-color: #1f1b14; opacity: 1; }
  .sig {
    margin-top: 52px;
    font-size: 16px;
    color: #4a4128;
    letter-spacing: 2px;
    text-align: right;
  }
  .fade { opacity: 0; transition: opacity 700ms ease; }
  .fade.in { opacity: 1; }
  .cross {
    margin-top: 44px;
    padding: 18px 22px;
    border: 1px dashed #8a7e5c;
    background: repeating-linear-gradient(
      135deg,
      rgba(138, 126, 92, 0.05) 0 8px,
      transparent 8px 16px
    );
    display: flex;
    align-items: center;
    gap: 18px;
    color: #2a2418;
    text-shadow: 0.3px 0.2px 0 rgba(0, 0, 0, 0.22);
  }
  .cross .hand {
    font-size: 26px;
    line-height: 1;
    transform: translateY(-1px);
    flex: 0 0 auto;
  }
  .cross .body-txt {
    flex: 1;
    font-size: 15px;
    line-height: 1.6;
  }
  .cross .body-txt small {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5a4f36;
    margin-bottom: 4px;
  }
  .cross a {
    color: #1f1b14;
    text-decoration: none;
    border-bottom: 1.5px solid #1f1b14;
    padding-bottom: 1px;
    letter-spacing: 1px;
  }
  .cross a::after {
    content: " \2197";
    display: inline-block;
    margin-left: 2px;
    transition: transform 200ms ease;
  }
  .cross a:hover::after {
    transform: translate(2px, -2px);
  }
</style>
</head>
<body>
  <div class="page">
    <div class="slug">
      <span class="left">net.dir / home</span>
      <span class="right">page &mdash; 1 &mdash;</span>
    </div>

    <div class="title" id="ttl"></div>
    <div class="sub" id="sub"></div>

    <div id="body"></div>

    <div class="cross fade" id="cross" aria-label="See also">
      <span class="hand" aria-hidden="true">&#9758;</span>
      <div class="body-txt">
        <small>see also</small>
        Search the message database at <a href="/mdb-lookup">mdb-lookup</a>, or register
        and post entries in <a href="/directory">the full directory</a>.
      </div>
    </div>

    <div class="sig fade" id="sig">
      &mdash; Shahana Abdin
    </div>
  </div>

  <button id="skip" style="display:none" onclick="showAll()">skip intro</button>

<script>
  const TITLE = 'Networked Directory';
  const SUB   = 'a systems project in c';
  const PARAS = [
    "An HTTP server, backed by a TCP lookup server and a binary database of names and messages. Search the database from the browser by name or by message content."
  ];

  let skipRequested = false;

  function showAll() {
    skipRequested = true;
    document.getElementById('ttl').textContent = TITLE;
    document.getElementById('sub').textContent = SUB;
    document.getElementById('body').innerHTML = '';
    PARAS.forEach(text => {
      const p = document.createElement('p');
      p.textContent = text;
      document.getElementById('body').appendChild(p);
    });
    document.getElementById('cross').classList.add('in');
    document.getElementById('sig').classList.add('in');
    document.getElementById('skip').style.display = 'none';
  }

  function type(el, text, ms) {
    return new Promise(res => {
      let i = 0;
      (function step() {
        if (skipRequested) { el.textContent = text; return res(); }
        el.textContent = text.slice(0, ++i);
        if (i >= text.length) return res();
        const pause = Math.random() < 0.04 ? 120 : 0;
        setTimeout(step, ms + (Math.random() - 0.5) * 12 + pause);
      })();
    });
  }

  function typePara(text) {
    if (skipRequested) return Promise.resolve();
    const p = document.createElement('p');
    document.getElementById('body').appendChild(p);
    return type(p, text, 18);
  }

  (async () => {
    document.getElementById('skip').style.display = 'block';

    await type(document.getElementById('ttl'), TITLE, 60);
    await new Promise(r => setTimeout(r, 280));
    await type(document.getElementById('sub'), SUB, 30);
    await new Promise(r => setTimeout(r, 480));
    for (const para of PARAS) {
      await typePara(para);
      await new Promise(r => setTimeout(r, 360));
    }
    document.getElementById('cross').classList.add('in');
    await new Promise(r => setTimeout(r, 400));
    document.getElementById('sig').classList.add('in');

    document.getElementById('skip').style.display = 'none';
  })
  ();
</script>
</body>
</html>
